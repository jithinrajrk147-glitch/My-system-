name: Build Android APK
on: [workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "tg-collector",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2",
              "@capacitor/local-notifications": "^6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          EOF

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.anxroall.collector",
            "appName": "TG Collector",
            "webDir": "www",
            "plugins": {
              "LocalNotifications": {
                "smallIcon": "ic_stat_icon_default",
                "iconColor": "#00ff99",
                "sound": "default"
              }
            }
          }
          EOF

      - name: Create index.html
        run: |
          cat > index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width,initial-scale=1.0">
          <title>TG Collector</title>
          <style>
          body {margin:0;font-family:Arial;background:#0f0f0f;color:white;padding:10px;}
          #log {height:300px;overflow-y:scroll;border:1px solid #0f0;padding:10px;margin:10px 0;font-size:12px;}
          input,button {width:100%;padding:12px;margin:5px 0;border:none;border-radius:6px;font-size:14px;}
          input {background:#1a1a1a;color:#0f0;border:1px solid #0f0;}
          button {background:#238636;color:#fff;cursor:pointer;}
          button:active {background:#2ea043;}
          .status {text-align:center;padding:10px;font-weight:bold;color:#0f0;}
          </style>
          <script type="module">
            import { Capacitor } from 'https://cdn.jsdelivr.net/npm/@capacitor/core@6.1.2/+esm';
            import { LocalNotifications } from 'https://cdn.jsdelivr.net/npm/@capacitor/local-notifications@6.1.2/+esm';
            
            window.notify = async (title, body) => {
              if (Capacitor.isNativePlatform()) {
                await LocalNotifications.schedule({
                  notifications: [{ 
                    title, 
                    body, 
                    id: Date.now(), 
                    schedule: { at: new Date(Date.now() + 1000) } 
                  }]
                });
              }
              log(`🔔 ${title}: ${body}`);
            };
            
            if (Capacitor.isNativePlatform()) {
              LocalNotifications.requestPermissions();
            }
          </script>
          </head>
          <body>
          <h3 style="text-align:center;color:#0f0;">TG Collector</h3>
          <div class="status" id="status">System Stopped</div>
          <input id="token" type="password" placeholder="GitHub PAT Token">
          <button onclick="saveToken()">💾 Save Token</button>
          <button onclick="toggleSystem()" id="toggleBtn">▶️ Start System</button>
          <div id="log">Ready...</div>
          <script>
          const CHANNEL = "ehsbeud";
          const GITHUB_USER = "anxroall-a";
          const GITHUB_REPO = "Websitesdatabase";
          let systemRunning = false;
          let interval = null;
          let msgCount = 0;
          
          document.getElementById('token').value = localStorage.getItem('gh_token') || '';
          
          const log = (msg) => {
            const el = document.getElementById('log');
            el.innerHTML += '<br>' + new Date().toLocaleTimeString() + ' - ' + msg;
            el.scrollTop = el.scrollHeight;
          };
          
          function saveToken() {
            const token = document.getElementById('token').value.trim();
            if (token) {
              localStorage.setItem('gh_token', token);
              log('✓ Token saved');
              notify('Token Saved', 'GitHub token stored successfully');
            } else {
              log('✗ Enter token first');
            }
          }
          
          function toggleSystem() {
            const btn = document.getElementById('toggleBtn');
            const status = document.getElementById('status');
            if (systemRunning) {
              systemRunning = false;
              clearInterval(interval);
              btn.innerText = '▶️ Start System';
              status.innerText = 'System Stopped';
              status.style.color = '#f85149';
              log('⏸️ System stopped');
              notify('System Stopped', 'Collector paused');
            } else {
              const token = localStorage.getItem('gh_token');
              if (!token) {
                log('✗ Enter GitHub PAT token first');
                notify('Error', 'GitHub token required');
                return;
              }
              systemRunning = true;
              btn.innerText = '⏸️ Stop System';
              status.innerText = 'System Running - Checking every 5 min';
              status.style.color = '#0f0';
              log('▶️ System started');
              notify('System Started', 'Collecting from @' + CHANNEL);
              checkTelegram();
              interval = setInterval(checkTelegram, 5 * 60 * 1000);
            }
          }
          
          async function checkTelegram() {
            if (!systemRunning) return;
            log('🔍 Checking Telegram...');
            try {
              const proxy = `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://t.me/s/${CHANNEL}`)}`;
              const res = await fetch(proxy, { signal: AbortSignal.timeout(10000) });
              if (!res.ok) {
                log('✗ Fetch failed: ' + res.status);
                return;
              }
              const html = await res.text();
              const doc = new DOMParser().parseFromString(html, "text/html");
              const posts = doc.querySelectorAll(".tgme_widget_message_text");
              if (posts.length === 0) {
                log('⚠ No messages found');
                return;
              }
              let newCount = 0;
              posts.forEach(p => {
                const text = p.innerText.trim();
                if (text.length > 20) {
                  msgCount++;
                  newCount++;
                }
              });
              log(`✓ Found ${newCount} messages. Total: ${msgCount}`);
              if (newCount > 0) {
                notify('New Messages', `Found ${newCount} new messages from Telegram`);
              }
            } catch (e) {
              log('✗ Error: ' + e.message);
            }
          }
          
          log('App loaded. Enter token and start system.');
          </script>
          </body>
          </html>
          HTMLEOF

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Prepare web assets
        run: |
          mkdir www
          cp index.html www/

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add notification permission and boot receiver
        run: |
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/><uses-permission android:name="android.permission.WAKE_LOCK"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"/></manifest>|' android/app/src/main/AndroidManifest.xml
          sed -i 's|</application>|<receiver android:enabled="true" android:exported="true" android:name=".BootReceiver" android:permission="android.permission.RECEIVE_BOOT_COMPLETED"><intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/><category android:name="android.intent.category.DEFAULT"/></intent-filter></receiver></application>|' android/app/src/main/AndroidManifest.xml

      - name: Create BootReceiver
        run: |
          mkdir -p android/app/src/main/java/com/anxroall/collector
          cat > android/app/src/main/java/com/anxroall/collector/BootReceiver.java << 'EOF'
          package com.anxroall.collector;
          import android.content.BroadcastReceiver;
          import android.content.Context;
          import android.content.Intent;
          public class BootReceiver extends BroadcastReceiver {
            @Override
            public void onReceive(Context context, Intent intent) {
              if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) {
                Intent i = new Intent(context, MainActivity.class);
                i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                context.startActivity(i);
              }
            }
          }
          EOF

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TG-Collector-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
