name: Build Android APK
on: [workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "tg-collector",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/android": "^6.1.2",
              "@capacitor/core": "^6.1.2",
              "@capacitor/local-notifications": "^6.1.2"
            },
            "devDependencies": {
              "@capacitor/cli": "^6.1.2"
            }
          }
          EOF

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.anxroall.collector",
            "appName": "TG Collector",
            "webDir": "www",
            "server": {
              "url": "https://anxroall-a.github.io/Websitesdatabase/index.html",
              "cleartext": true
            },
            "android": {
              "allowMixedContent": true,
              "backgroundColor": "#0f0f0f"
            },
            "plugins": {
              "LocalNotifications": {
                "smallIcon": "ic_stat_icon_default",
                "iconColor": "#00ff99"
              }
            }
          }
          EOF

      - name: Install dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Prepare web assets
        run: |
          mkdir www
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>TG Collector</title><meta name="viewport" content="width=device-width,initial-scale=1"><script>location.href="https://anxroall-a.github.io/Websitesdatabase/index.html"</script></head><body style="background:#0f0f0f;color:#fff;font-family:Arial;text-align:center;padding-top:50px;">Loading...</body></html>' > www/index.html

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add permissions only
        run: |
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET"/><uses-permission android:name="android.permission.ACCESS_NETWORK_STATE"/><uses-permission android:name="android.permission.WAKE_LOCK"/><uses-permission android:name="android.permission.POST_NOTIFICATIONS"/></manifest>|' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TG-Collector-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
