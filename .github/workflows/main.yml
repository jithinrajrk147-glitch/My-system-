name: Build XOX Hotspot APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Create package.json
        run: |
          cat > package.json << 'EOF'
          {
            "name": "xoxhotspot",
            "version": "1.0.0",
            "dependencies": {
              "@capacitor/core": "6.1.2",
              "@capacitor/android": "6.1.2",
              "capacitor-websocket-server": "^1.0.7"
            },
            "devDependencies": {
              "@capacitor/cli": "6.1.2"
            }
          }
          EOF

      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.xox.hotspot",
            "appName": "XOX Hotspot",
            "webDir": "www",
            "server": {
              "androidScheme": "https",
              "cleartext": true
            }
          }
          EOF

      - run: npm install
      - run: npx cap add android
      - run: npx cap sync android

      - name: Add permissions
        run: |
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.INTERNET" />\n<uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />\n<uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n</manifest>|' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: XOX-Hotspot-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
