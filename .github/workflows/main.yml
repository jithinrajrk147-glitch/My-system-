name: Build Android APK
on: [workflow_dispatch]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Create files
        run: |
          cat > package.json << 'EOF'
          {"name":"tg-collector","version":"1.0.0","dependencies":{"@capacitor/android":"^6.1.2","@capacitor/core":"^6.1.2"},"devDependencies":{"@capacitor/cli":"^6.1.2"}}
          EOF
          cat > capacitor.config.json << 'EOF'
          {"appId":"com.anxroall.collector","appName":"TG Collector","webDir":"www"}
          EOF
          cat > index.html << 'EOF'
          <!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>TG Collector</title><style>body{font-family:sans-serif;padding:20px;background:#111;color:#0f0}input,button{width:100%;padding:10px;margin:5px 0}#log{height:200px;overflow-y:scroll;border:1px solid #0f0;padding:10px}</style></head><body><h3>TG Collector</h3><input id="token" placeholder="GitHub PAT Token"><button onclick="localStorage.setItem('gh_token',document.getElementById('token').value);log('Token saved')">Save Token</button><button onclick="log('System started - polling every 5 min')">Start System</button><div id="log">Ready...</div><script>const log=(msg)=>document.getElementById('log').innerHTML+='<br>'+msg;document.getElementById('token').value=localStorage.getItem('gh_token')||'';</script></body></html>
          EOF
      - run: npm install
      - run: npx cap add android
      - run: mkdir www && cp index.html www/
      - run: npx cap sync android
      - name: Add permissions and boot receiver
        run: |
          sed -i 's|</manifest>|<uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED"/><uses-permission android:name="android.permission.WAKE_LOCK"/><uses-permission android:name="android.permission.FOREGROUND_SERVICE"/><uses-permission android:name="android.permission.REQUEST_IGNORE_BATTERY_OPTIMIZATIONS"/></manifest>|' android/app/src/main/AndroidManifest.xml
          sed -i 's|</application>|<receiver android:enabled="true" android:exported="true" android:name=".BootReceiver" android:permission="android.permission.RECEIVE_BOOT_COMPLETED"><intent-filter><action android:name="android.intent.action.BOOT_COMPLETED"/><category android:name="android.intent.category.DEFAULT"/></intent-filter></receiver></application>|' android/app/src/main/AndroidManifest.xml
      - name: Create BootReceiver
        run: |
          mkdir -p android/app/src/main/java/com/anxroall/collector
          echo 'package com.anxroall.collector; import android.content.BroadcastReceiver; import android.content.Context; import android.content.Intent; public class BootReceiver extends BroadcastReceiver { @Override public void onReceive(Context context, Intent intent) { if (Intent.ACTION_BOOT_COMPLETED.equals(intent.getAction())) { Intent i = new Intent(context, MainActivity.class); i.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK); context.startActivity(i); } } }' > android/app/src/main/java/com/anxroall/collector/BootReceiver.java
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: TG-Collector-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
